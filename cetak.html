<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cetak Foto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<div class="cetak-container">
  <h1>Siap Cetak 🖨️</h1>
  <div class="cetak-wrapper">

    <div class="cetak-preview-side">
      <h2>Preview Hasil</h2>
      <div class="cetak-canvas-box">
        <p class="no-preview" id="noPreview">⏳ Memuat preview...</p>
        <img id="previewImg" alt="Preview" style="display:none;">
      </div>
      <p id="infoLayout" style="font-size:11px;color:#888;margin-top:8px;text-align:center;"></p>
    </div>

    <div class="cetak-info-side">
      <div class="cetak-card">
        <h2>Info Sesi</h2>
        <div class="info-row"><span>Nama</span>   <strong id="infoNama">-</strong></div>
        <div class="info-row"><span>Layout</span> <strong id="infoLayoutName">-</strong></div>
        <div class="info-row"><span>Filter</span> <strong id="infoFilter">-</strong></div>
        <div class="info-row"><span>Frame</span>  <strong id="infoFrame">-</strong></div>
        <div class="info-row"><span>Stiker</span> <strong id="infoStiker">-</strong></div>
      </div>

      <div class="cetak-card">
        <h2>Jumlah Cetak</h2>
        <div class="qty-control">
          <button onclick="changeQty(-1)">−</button>
          <span id="qtyDisplay">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
        <p style="font-size:11px;color:#888;margin-top:8px;text-align:center;">Maks 3x cetak per sesi</p>
      </div>

      <div class="cetak-actions">
        <button id="btnCetak"    onclick="doCetak()"    class="btn-cetak"  disabled>🖨️ Cetak Sekarang</button>
        <button id="btnDownload" onclick="doDownload()" class="btn-outline" disabled>⬇️ Download</button>
        <button onclick="window.location.href='pilih-frame.html'" class="btn-grey">← Edit Ulang</button>
        <button onclick="selesaiSesi()" class="btn-green">✅ Selesai</button>
      </div>
      <p id="msgCetak"></p>
    </div>
  </div>
</div>

<!-- Print area -->
<div id="printArea" style="display:none;"></div>

<script type="module">
  import { supabase } from "./assets/js/supabase.js";

  // ── Guard & ambil data dari sessionStorage ────────────────────────────
  let cetakData = null;
  try {
    const raw = sessionStorage.getItem("cetakData");
    const gd  = sessionStorage.getItem("guestData");
    if (!raw || !gd) { window.location.href = "guest-login.html"; }
    cetakData = JSON.parse(raw);
  } catch(e) { window.location.href = "guest-login.html"; }

  let finalUrl = cetakData.finalUrl;   // signed URL dari pilih-frame.html
  let blobUrl  = null;                 // blob URL lokal untuk print & download
  let qty      = 1;

  // ── Isi info sesi ─────────────────────────────────────────────────────
  function fillInfoSesi() {
    document.getElementById("infoNama").textContent       = cetakData.guestNama    ?? "-";
    document.getElementById("infoLayoutName").textContent = cetakData.layout?.nama ?? "-";
    document.getElementById("infoFilter").textContent     =
      (!cetakData.filter || cetakData.filter === "none") ? "Original" : "Aktif";
    document.getElementById("infoFrame").textContent      = cetakData.frame?.name  ?? "Tanpa Frame";
    document.getElementById("infoStiker").textContent     =
      (cetakData.stiker?.length > 0) ? `${cetakData.stiker.length} stiker` : "Tidak ada";
    document.getElementById("infoLayout").textContent     =
      `${cetakData.layout?.orientasi ?? ""} · ${cetakData.layout?.rows ?? "-"}×${cetakData.layout?.cols ?? "-"}`;
  }

  // ── Refresh signed URL jika expired ───────────────────────────────────
  async function refreshSignedUrl() {
    try {
      setPreviewMsg("⏳ Memperbarui akses foto...");
      const { data, error } = await supabase.storage
        .from("photos").createSignedUrl(cetakData.editPath, 3600);
      if (error || !data?.signedUrl) throw new Error(error?.message ?? "Gagal buat signed URL");
      finalUrl          = data.signedUrl;
      cetakData.finalUrl = finalUrl;
      sessionStorage.setItem("cetakData", JSON.stringify(cetakData));
      return true;
    } catch(e) {
      setPreviewError("❌ Gagal akses foto: " + e.message);
      return false;
    }
  }

  // ── Load preview — fetch → blob ───────────────────────────────────────
  async function loadPreview() {
    setPreviewMsg("⏳ Memuat preview...");
    try {
      let res = await fetch(finalUrl);
      if (!res.ok) {
        // Signed URL mungkin expired — refresh sekali
        const ok = await refreshSignedUrl();
        if (!ok) return;
        res = await fetch(finalUrl);
        if (!res.ok) throw new Error("HTTP " + res.status);
      }
      const blob = await res.blob();
      blobUrl = URL.createObjectURL(blob);

      const previewImg = document.getElementById("previewImg");
      previewImg.onload = () => {
        document.getElementById("noPreview").style.display = "none";
        previewImg.style.display = "block";
      };
      previewImg.src = blobUrl;

      document.getElementById("btnCetak").disabled    = false;
      document.getElementById("btnDownload").disabled = false;

    } catch(e) {
      setPreviewError("❌ Gagal load gambar: " + e.message + ". Coba edit ulang.");
    }
  }

  // ── Qty ───────────────────────────────────────────────────────────────
  window.changeQty = function(delta) {
    qty = Math.max(1, Math.min(3, qty + delta));
    document.getElementById("qtyDisplay").textContent = qty;
  };

  // ── CETAK ─────────────────────────────────────────────────────────────
  window.doCetak = function() {
    if (!blobUrl) { showMsg("❌ Gambar belum siap.", "red"); return; }
    showMsg("⏳ Menyiapkan cetak...", "#666");

    const printArea = document.getElementById("printArea");
    let pages = "";
    for (let i = 0; i < qty; i++) {
      pages += `<div style="page-break-after:${i < qty - 1 ? 'always' : 'avoid'};
        width:100vw;height:100vh;display:flex;align-items:center;
        justify-content:center;background:white;">
        <img src="${blobUrl}" style="max-width:100%;max-height:100vh;object-fit:contain;">
      </div>`;
    }
    printArea.innerHTML  = pages;
    printArea.style.display = "flex";

    setTimeout(() => {
      window.print();
      setTimeout(() => {
        printArea.style.display = "none";
        printArea.innerHTML = "";
        showMsg("✅ " + qty + "x halaman dikirim ke printer!", "green");
      }, 500);
    }, 200);
  };

  // ── DOWNLOAD ──────────────────────────────────────────────────────────
  window.doDownload = function() {
    if (!blobUrl) { showMsg("❌ Gambar belum siap.", "red"); return; }
    const nama = (cetakData.guestNama ?? "foto").replace(/[^a-zA-Z0-9]/g, "_");
    const tgl  = new Date().toISOString().slice(0, 10);
    const link = document.createElement("a");
    link.href     = blobUrl;
    link.download = `photobooth_${nama}_${tgl}.jpg`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showMsg("✅ Foto berhasil didownload!", "green");
  };

  // ── Selesai ───────────────────────────────────────────────────────────
  window.selesaiSesi = function() {
    if (!confirm("Sesi selesai? Kamu akan kembali ke halaman login.")) return;
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    sessionStorage.removeItem("cetakData");
    sessionStorage.removeItem("guestData");
    sessionStorage.removeItem("selectedBranch");
    window.location.href = "guest-login.html";
  };

  // ── Helpers ───────────────────────────────────────────────────────────
  function setPreviewMsg(text) {
    const el = document.getElementById("noPreview");
    el.textContent = text; el.style.display = "block";
    document.getElementById("previewImg").style.display = "none";
  }
  function setPreviewError(text) { setPreviewMsg(text); }
  function showMsg(text, color) {
    const el = document.getElementById("msgCetak");
    el.textContent = text; el.style.color = color;
  }

  // ── Start ─────────────────────────────────────────────────────────────
  fillInfoSesi();

  if (!finalUrl && cetakData.editPath) {
    refreshSignedUrl().then(ok => { if (ok) loadPreview(); });
  } else if (finalUrl) {
    loadPreview();
  } else {
    setPreviewError("❌ Data foto tidak ditemukan. Kembali ke edit.");
  }
</script>

</body>
</html>
