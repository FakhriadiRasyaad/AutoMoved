<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Cabang — Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f3ed;
      --card-bg: #ffffff;
      --pink: #d63f6b;
      --pink-dark: #b02d55;
      --pink-light: #fce8ee;
      --brown: #2c1810;
      --muted: #8c7268;
      --border: #e8ddd6;
      --shadow-sm: 0 4px 12px rgba(44, 24, 16, 0.08);
      --shadow-hover: 0 12px 24px rgba(214, 63, 107, 0.15);
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* Hero Section */
    .hero {
      padding: 48px 24px 32px;
      text-align: center;
    }

    .hero-cam {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(145deg, var(--pink), var(--pink-dark));
      font-size: 38px;
      margin-bottom: 20px;
      box-shadow: 0 12px 32px rgba(214, 63, 107, 0.25);
      transition: transform 0.3s;
    }

    .hero-cam:hover {
      transform: scale(1.05);
    }

    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--brown);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .hero h1 em {
      color: var(--pink);
      font-style: italic;
    }

    .hero p {
      font-size: 15px;
      color: var(--muted);
      max-width: 280px;
      margin: 0 auto;
    }

    /* Branch Section */
    .branch-section {
      flex: 1;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px 48px;
    }

    .sec-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .branch-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .branch-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      animation: slideUp 0.4s ease both;
    }

    .branch-card:hover {
      border-color: var(--pink);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .branch-card:active {
      transform: translateY(0);
    }

    .bc-avatar {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      border-radius: 14px;
      background: var(--pink-light);
      color: var(--pink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      font-family: 'Fraunces', serif;
      border: 2px solid rgba(214, 63, 107, 0.15);
    }

    .bc-info {
      flex: 1;
      min-width: 0;
    }

    .bc-name {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 4px;
    }

    .bc-code {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .bc-code::before {
      content: "🔑";
      font-size: 11px;
      opacity: 0.7;
    }

    .bc-arrow {
      color: var(--muted);
      font-size: 24px;
      font-weight: 300;
      transition: var(--transition);
    }

    .branch-card:hover .bc-arrow {
      transform: translateX(6px);
      color: var(--pink);
    }

    /* Animasi */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .branch-card:nth-child(1) { animation-delay: 0.05s; }
    .branch-card:nth-child(2) { animation-delay: 0.10s; }
    .branch-card:nth-child(3) { animation-delay: 0.15s; }
    .branch-card:nth-child(4) { animation-delay: 0.20s; }
    .branch-card:nth-child(5) { animation-delay: 0.25s; }
    .branch-card:nth-child(6) { animation-delay: 0.30s; }

    /* Skeleton loading */
    .skel {
      background: linear-gradient(90deg, #f0ebe5 25%, #e4dbd4 50%, #f0ebe5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 18px;
      height: 86px;
    }

    @keyframes shimmer {
      to {
        background-position: -200% 0;
      }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
    }

    .empty-state div:first-child {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.7;
    }

    /* Footer */
    .footer-note {
      text-align: center;
      padding: 20px 24px 32px;
      font-size: 12px;
      color: #c5b8b0;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .hero h1 {
        font-size: 30px;
      }
      .branch-card {
        padding: 14px 18px;
      }
      .bc-avatar {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-cam">📸</div>
    <h1>Ambil <em>Foto</em> Kamu!</h1>
    <p>Pilih cabang tempat kamu berfoto tadi</p>
  </div>

  <div class="branch-section">
    <div class="sec-label">Pilih Lokasi Cabang</div>
    <div class="branch-grid" id="branchGrid">
      <!-- skeleton akan diganti oleh JS -->
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </div>

  <div class="footer-note">📍 Photobooth System — Nikmati fotomu!</div>

  <script type="module">
    import { supabase } from "./assets/js/supabase.js";

    const grid = document.getElementById("branchGrid");

    async function loadBranches() {
      const { data: branches, error } = await supabase
        .from("branches")
        .select("id, name, code")
        .order("name", { ascending: true });

      if (error || !branches?.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div>🏪</div>
            <div>Tidak ada cabang tersedia.</div>
            <p style="margin-top: 12px; font-size: 13px;">Silakan hubungi admin.</p>
          </div>`;
        return;
      }

      grid.innerHTML = branches.map(b => {
        // Escape nama untuk disisipkan ke onclick (amankan dari kutip)
        const safeName = b.name.replace(/'/g, "\\'");
        return `
          <div class="branch-card" onclick="pickBranch('${b.id}', '${safeName}', '${b.code}')">
            <div class="bc-avatar">${b.name.charAt(0).toUpperCase()}</div>
            <div class="bc-info">
              <div class="bc-name">${b.name}</div>
              <div class="bc-code">${b.code}</div>
            </div>
            <div class="bc-arrow">›</div>
          </div>
        `;
      }).join("");
    }

    window.pickBranch = function(id, name, code) {
      sessionStorage.setItem("selectedBranch", JSON.stringify({ id, name, code }));
      sessionStorage.removeItem("guestData"); // bersihkan data login sebelumnya
      window.location.href = "guest-login.html";
    };

    // Jalankan
    loadBranches();
  </script>
</body>
</html>
