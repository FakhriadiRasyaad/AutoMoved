<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f3ed;
      --card: #ffffff;
      --pink: #d63f6b;
      --pink-dark: #b02d55;
      --rose: #fce8ee;
      --brown: #2c1810;
      --muted: #8c7268;
      --border: #e8ddd6;
      --shadow-sm: 0 4px 12px rgba(44, 24, 16, 0.06);
      --shadow-md: 0 8px 24px rgba(44, 24, 16, 0.08);
      --shadow-lg: 0 20px 40px rgba(44, 24, 16, 0.12);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .blob1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(214, 63, 107, 0.07) 0%, transparent 70%);
      top: -100px;
      right: -80px;
    }

    .blob2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(196, 135, 58, 0.06) 0%, transparent 70%);
      bottom: -80px;
      left: -60px;
    }

    /* Card utama */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border-radius: 32px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm), var(--shadow-md), var(--shadow-lg);
      animation: up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Branch chip */
    .branch-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--rose);
      border: 1px solid rgba(214, 63, 107, 0.2);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 28px;
      cursor: pointer;
      transition: var(--transition);
    }

    .branch-chip:hover {
      background: #f8d8e2;
      border-color: var(--pink);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(214, 63, 107, 0.15);
    }

    .bc-dot {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(214, 63, 107, 0.25);
    }

    .bc-text {
      flex: 1;
      min-width: 0;
    }

    .bc-text .bname {
      font-size: 14px;
      font-weight: 700;
      color: var(--brown);
      line-height: 1.3;
    }

    .bc-text .bsub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .bc-change {
      font-size: 12px;
      color: var(--pink);
      font-weight: 600;
      white-space: nowrap;
      background: white;
      padding: 6px 12px;
      border-radius: 30px;
      box-shadow: 0 2px 6px rgba(214, 63, 107, 0.1);
      transition: var(--transition);
    }

    .branch-chip:hover .bc-change {
      background: var(--pink);
      color: white;
    }

    /* Title */
    .title {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--brown);
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .title em {
      color: var(--pink);
      font-style: italic;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* Form fields */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--brown);
      background: #fbf8f5;
      outline: none;
      transition: var(--transition);
    }

    .field input:focus {
      border-color: var(--pink);
      background: white;
      box-shadow: 0 0 0 4px rgba(214, 63, 107, 0.12);
    }

    .field input::placeholder {
      color: #c0ada2;
      font-weight: 300;
    }

    /* Button */
    .btn {
      width: 100%;
      margin-top: 16px;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(214, 63, 107, 0.3);
      transition: var(--transition);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(214, 63, 107, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error box */
    .err {
      background: #fef2f5;
      border: 1px solid #f9bece;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--pink-dark);
      margin-top: 16px;
      display: none;
      text-align: center;
      font-weight: 500;
    }

    .err.show {
      display: block;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }
      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <!-- Branch chip – klik untuk ganti cabang -->
    <div class="branch-chip" id="branchChip" onclick="">
      <div class="bc-dot" id="branchInitial">?</div>
      <div class="bc-text">
        <div class="bname" id="branchName">Memuat cabang...</div>
        <div class="bsub" id="branchCode">—</div>
      </div>
    </div>

    <div class="title">Hai, <em>Selamat</em> Datang!</div>
    <div class="subtitle">Masukkan data kamu untuk melihat foto</div>

    <div class="field">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="cth: Budi Santoso" autocomplete="name">
    </div>
    <div class="field">
      <label>Nomor HP</label>
      <input type="tel" id="nohp" placeholder="cth: 081234567890" autocomplete="tel">
    </div>

    <button class="btn" id="btnLogin" onclick="doLogin()">
      <span>✨</span> Lihat Foto Saya
    </button>
    <div class="err" id="errBox"></div>
  </div>

  <script>
    // Ambil branch dari sessionStorage
    var branch = null;
    try {
      branch = JSON.parse(sessionStorage.getItem("selectedBranch"));
    } catch(e) {
      // ignore
    }

    if (!branch) {
      window.location.href = "guest-select-branch.html";
    }

    // Tampilkan informasi cabang
    document.getElementById("branchInitial").textContent = branch.name.charAt(0).toUpperCase();
    document.getElementById("branchName").textContent = branch.name;
    document.getElementById("branchCode").textContent = "Kode: " + branch.code;

    function changeBranch() {
      sessionStorage.removeItem("selectedBranch");
      sessionStorage.removeItem("guestData");
      window.location.href = "guest-select-branch.html";
    }

    function showErr(m) {
      var b = document.getElementById("errBox");
      b.textContent = m;
      b.classList.add("show");
    }

    function hideErr() {
      document.getElementById("errBox").classList.remove("show");
    }

    function setLoading(on) {
      var btn = document.getElementById("btnLogin");
      btn.disabled = on;
      btn.innerHTML = on 
        ? '<span class="spinner"></span>Mencari foto...' 
        : '<span>✨</span> Lihat Foto Saya';
    }

    // Enter untuk login
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") doLogin();
    });
  </script>

  <script type="module">
    import { supabase } from "./assets/js/supabase.js";

    window.doLogin = async function() {
      hideErr();
      var nama = document.getElementById("nama").value.trim();
      var nohp = document.getElementById("nohp").value.trim().replace(/\s+/g, "");

      if (!nama || !nohp) {
        showErr("Nama dan nomor HP wajib diisi!");
        return;
      }

      setLoading(true);

      var branchId = branch.id;

      // Cari guest di branch yang dipilih
      var { data: guests, error: gErr } = await supabase
        .from("guests")
        .select("id, nama, nohp, branch_id")
        .ilike("nama", nama)
        .eq("nohp", nohp)
        .eq("branch_id", branchId);

      if (gErr || !guests?.length) {
        // Fallback: cari tanpa filter branch
        var { data: guests2 } = await supabase
          .from("guests")
          .select("id, nama, nohp, branch_id")
          .ilike("nama", nama)
          .eq("nohp", nohp);
        guests = guests2;
      }

      if (!guests?.length) {
        setLoading(false);
        showErr("Nama atau nomor HP tidak ditemukan di cabang ini.");
        return;
      }

      var guestIds = guests.map(function(g) { return g.id; });
      var { data: sessions } = await supabase
        .from("sessions")
        .select("id, guest_id, branch_id, paket, status, created_at")
        .in("guest_id", guestIds)
        .order("created_at", { ascending: false });

      if (!sessions?.length) {
        setLoading(false);
        showErr("Foto kamu belum tersedia. Coba beberapa saat lagi.");
        return;
      }

      // Simpan data guest dan sessions
      sessionStorage.setItem("guestData", JSON.stringify({ guest: guests[0], sessions: sessions }));
      setLoading(false);
      window.location.href = "guest-gallery.html";
    };
  </script>
</body>
</html>
